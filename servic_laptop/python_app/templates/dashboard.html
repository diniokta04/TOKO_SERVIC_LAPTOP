<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Servis Laptop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container my-5">
        <div class="d-flex justify-content-between mb-4">
            <h2 class="text-primary fw-bold">🛠️ Dashboard Antrean Servis</h2>
            <button id="logout-btn" class="btn btn-danger btn-sm">Keluar</button>
        </div>
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card p-4 shadow-sm">
                    <h5>Tambah Antrean</h5>
                    <form id="servis-form">
                        <div class="mb-3"><label class="form-label">Pelanggan</label><input type="text" id="nama_pelanggan" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Perangkat</label><input type="text" id="jenis_perangkat" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Keluhan</label><textarea id="keluhan" class="form-control" rows="3" required></textarea></div>
                        <button type="submit" class="btn btn-success w-100">Simpan</button>
                    </form>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card p-4 shadow-sm">
                    <table class="table table-striped">
                        <thead class="table-dark"><tr><th>Nama</th><th>Perangkat</th><th>Keluhan</th></tr></thead>
                        <tbody id="tabel-servis-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/js/api-client.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
