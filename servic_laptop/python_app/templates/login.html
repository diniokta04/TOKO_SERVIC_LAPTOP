<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - Toko Servis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container my-5 row justify-content-center mx-auto">
        <div class="col-md-4 card p-4 shadow-sm">
            <h4 class="text-center mb-3">Login Sistem Servis</h4>
            <div id="login-alert" class="alert alert-danger d-none"></div>
            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="login-email" class="form-control" required placeholder="Email Anda">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="login-password" class="form-control" required placeholder="******">
                </div>
                <button type="submit" class="btn btn-primary w-100">Masuk</button>
            </form>
        </div>
    </div>
    <script src="/static/js/api-client.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
